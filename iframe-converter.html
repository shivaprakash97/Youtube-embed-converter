<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Responsive Embed Converter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f4f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 620px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #111;
      margin-bottom: 6px;
    }

    p.subtitle {
      font-size: 14px;
      color: #777;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      height: 130px;
      padding: 12px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      color: #333;
      resize: vertical;
      transition: border-color 0.2s;
      outline: none;
    }

    textarea:focus {
      border-color: #6c63ff;
    }

    button#convertBtn {
      margin-top: 16px;
      width: 100%;
      padding: 13px;
      background: #6c63ff;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button#convertBtn:hover { background: #574fd6; }

    .output-section {
      margin-top: 28px;
      display: none;
    }

    .output-section.visible { display: block; }

    .output-box {
      position: relative;
      background: #f8f8fc;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      padding: 14px;
    }

    .output-box pre {
      font-size: 12.5px;
      font-family: 'Courier New', monospace;
      color: #333;
      white-space: pre-wrap;
      word-break: break-all;
    }

    button#copyBtn {
      margin-top: 12px;
      width: 100%;
      padding: 11px;
      background: white;
      color: #6c63ff;
      border: 1.5px solid #6c63ff;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    button#copyBtn:hover {
      background: #6c63ff;
      color: white;
    }

    .error {
      margin-top: 14px;
      padding: 12px 14px;
      background: #fff0f0;
      border: 1.5px solid #ffcccc;
      border-radius: 10px;
      font-size: 13px;
      color: #cc3333;
      display: none;
    }

    .error.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Responsive Embed Converter</h1>
    <p class="subtitle">Paste a YouTube embed code below and get a responsive, mobile-friendly version.</p>

    <label for="input">Paste embed code</label>
    <textarea id="input" placeholder='<iframe width="560" height="315" src="https://www.youtube.com/embed/..." ...></iframe>'></textarea>

    <button id="convertBtn">Convert →</button>

    <div class="error" id="error">Hmm, that doesn't look like a valid iframe embed code. Please check and try again.</div>

    <div class="output-section" id="outputSection">
      <label style="margin-top: 0; margin-bottom: 12px;">Responsive embed code</label>
      <div class="output-box">
        <pre id="output"></pre>
      </div>
      <button id="copyBtn">Copy to clipboard</button>
    </div>
  </div>

  <script>
    const convertBtn = document.getElementById('convertBtn');
    const copyBtn = document.getElementById('copyBtn');
    const inputEl = document.getElementById('input');
    const outputEl = document.getElementById('output');
    const outputSection = document.getElementById('outputSection');
    const errorEl = document.getElementById('error');

    convertBtn.addEventListener('click', () => {
      const raw = inputEl.value.trim();
      errorEl.classList.remove('visible');
      outputSection.classList.remove('visible');

      if (!raw.includes('<iframe') || !raw.includes('src=')) {
        errorEl.classList.add('visible');
        return;
      }

      // Extract src
      const srcMatch = raw.match(/src=["']([^"']+)["']/);
      const titleMatch = raw.match(/title=["']([^"']+)["']/);
      if (!srcMatch) {
        errorEl.classList.add('visible');
        return;
      }

      const src = srcMatch[1];
      const title = titleMatch ? titleMatch[1] : 'Video player';

      const result = `<div style="position:relative;width:100%;max-width:100%;height:0;padding-bottom:56.25%;overflow:hidden;border-radius:12px;">
  <iframe
    src="${src}"
    title="${title}"
    style="position:absolute;inset:0;width:100%;height:100%;border:0;"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    loading="lazy"
    referrerpolicy="strict-origin-when-cross-origin"
    allowfullscreen
  ></iframe>
</div>`;

      outputEl.textContent = result;
      outputSection.classList.add('visible');
    });

    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(outputEl.textContent).then(() => {
        copyBtn.textContent = '✓ Copied!';
        setTimeout(() => copyBtn.textContent = 'Copy to clipboard', 2000);
      });
    });
  </script>
</body>
</html>
